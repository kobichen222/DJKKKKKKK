name: Build Desktop App (Windows)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - 'public/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show build context
        shell: bash
        run: |
          echo "Node:  $(node -v)"
          echo "npm:   $(npm -v)"
          echo "OS:    ${{ runner.os }}"
          echo "Arch:  ${{ runner.arch }}"
          echo "Ref:   ${{ github.ref }}"
          echo "SHA:   ${{ github.sha }}"
          echo "--- package.json (name + version) ---"
          node -e "const p=require('./package.json');console.log(p.name, p.version)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify electron-builder is present
        shell: bash
        run: |
          ls node_modules/.bin/electron-builder* 2>&1 || true
          npx --no-install electron-builder --version

      - name: Derive version (auto-bump to next unused tag)
        id: ver
        shell: bash
        # UI-only commits land in public/** without bumping package.json. If we
        # used that version as-is, the softprops release step would collide with
        # the existing tag and fail (or return a frozen immutable release).
        # Instead, walk patch numbers forward until we find one GitHub hasn't
        # tagged yet, and rewrite package.json in the runner workspace so
        # electron-builder stamps the same version into the .exe + latest.yml.
        # The bump isn't committed back — next build re-derives from current
        # package.json + live remote tags.
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="$(node -p "require('./package.json').version")"; fi
          while git ls-remote --exit-code --tags origin "refs/tags/v$V" >/dev/null 2>&1; do
            V="$(node -p "const v='$V'.split('.');v[2]=String(Number(v[2])+1);v.join('.')")"
          done
          node -e "const fs=require('fs');const p=require('./package.json');p.version='$V';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"    >> "$GITHUB_OUTPUT"
          echo "Building version $V (tag v$V)"

      - name: Build Windows installer (no publish)
        shell: bash
        run: npx electron-builder --win --x64 --publish never

      - name: List dist-electron
        shell: bash
        run: |
          ls -la dist-electron/ || true
          echo "--- .exe files ---"
          find dist-electron -maxdepth 2 -name '*.exe' -printf '%p  %s bytes\n' || true

      - name: Upload installer artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.ver.outputs.version }}
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release with Windows .exe
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
