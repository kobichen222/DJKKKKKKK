name: Build Desktop App

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.2). Leave blank to use package.json version.'
        required: false
        default: ''
  # Automatic on tag push matching v*
  push:
    tags:
      - 'v*'
    # Also auto-build when the version or build config changes on main
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Windows is the flagship target — must succeed. macOS and Linux are
    # marked optional so a signing or runner issue there cannot block the
    # Windows release from publishing.
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            optional: false
          - os: ubuntu-latest
            platform: linux
            optional: true
          - os: macos-latest
            platform: mac
            optional: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Derive version from tag or input
        shell: bash
        run: |
          V=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          if [ -n "$V" ]; then
            node -e "const fs=require('fs');const p=require('./package.json');p.version='$V';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
            echo "Version set to $V"
          else
            echo "Using package.json version: $(node -p "require('./package.json').version")"
          fi

      - name: Build + publish Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code-signing (no certs in repo) — still produces an
          # installable unsigned DMG / ZIP.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:${{ matrix.platform }} -- --publish always

      # Safety net: keep the raw installer as a workflow artifact so a human
      # can grab it from the Actions run even if the publish step ever has
      # trouble attaching it to the GitHub Release.
      - name: Upload installer as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
          if-no-files-found: ignore
          retention-days: 30
