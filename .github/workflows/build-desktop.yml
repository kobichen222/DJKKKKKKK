name: Build Desktop App (Windows)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show build context
        shell: bash
        run: |
          echo "Node:  $(node -v)"
          echo "npm:   $(npm -v)"
          echo "OS:    ${{ runner.os }}"
          echo "Arch:  ${{ runner.arch }}"
          echo "Ref:   ${{ github.ref }}"
          echo "SHA:   ${{ github.sha }}"
          echo "--- package.json (name + version) ---"
          node -e "const p=require('./package.json');console.log(p.name, p.version)"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify electron-builder is present
        shell: bash
        run: |
          ls node_modules/.bin/electron-builder* 2>&1 || true
          npx --no-install electron-builder --version

      - name: Derive version (from input or package.json)
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="$(node -p "require('./package.json').version")"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"    >> "$GITHUB_OUTPUT"
          echo "Building version $V (tag v$V)"

      - name: Build Windows installer (no publish)
        shell: bash
        run: npx electron-builder --win --x64 --publish never

      - name: List dist-electron
        shell: bash
        run: |
          ls -la dist-electron/ || true
          echo "--- .exe files ---"
          find dist-electron -maxdepth 2 -name '*.exe' -printf '%p  %s bytes\n' || true

      - name: Upload installer artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.ver.outputs.version }}
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release with Windows .exe
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
